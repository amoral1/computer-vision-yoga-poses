server {
    listen 443 ssl http2;
    server_name portfolio.anaismorales.com;

    ssl_certificate     /etc/letsencrypt/live/portfolio.anaismorales.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/portfolio.anaismorales.com/privkey.pem;

    # ──  existing static portfolio index (untouched) ─────────────────────────
    root /var/www/portfolio;   # whatever your current static root is
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    # ── Existing /deepfakebayesian (untouched, just shown for context) ─
    # location /deepfakebayesian/ { ... }

    # ── NEW: Yoga pose classifier 
  location /yogaposeclassifier/ {
    proxy_pass http://127.0.0.1:8502/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_read_timeout 86400;
    client_max_body_size 25M;
}
